name: e_commerce
description: "A full-stack modern e-commerce app with Flutter & Supabase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.12.2

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^17.1.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.1.2
  fl_chart: ^1.2.0
  google_fonts: ^6.2.1
  marquee: ^2.2.3

  # Auth
  google_sign_in: ^7.2.0

  # Utils
  image_picker: ^1.2.1
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "ios/logo.jpeg"
    background_color: "#ffffff"
    theme_color: "#6C63FF"
  image_path: "ios/logo.jpeg"
  min_sdk_android: 21

dependency_overrides:
  path_provider_android: 2.2.22

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - ios/logo.jpeg
    - env_file


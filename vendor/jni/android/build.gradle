``// Vendored and modified from upstream to guard ndkVersion access and avoid Flutter provider issues.

// The Android Gradle Plugin builds the native code with the Android NDK.

group 'com.github.dart_lang.jni'
version '1.0'

buildscript {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

android {
    // Keeping the classes from being removed by proguard.
    defaultConfig {
        consumerProguardFiles 'consumer-rules.pro'
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }

    // Condition for namespace compatibility in AGP 8
    if (project.android.hasProperty("namespace")) {
        namespace 'com.github.dart_lang.jni'
    }

    // Adding [PortContinuation] and [PortProxy] classes shared between Flutter and
    // Dart-standalone versions of package:jni.
    sourceSets {
        main {
            java {
                srcDirs '../java/src/main/java'
            }
        }
    }

    // Bumping the plugin compileSdk requires all clients of this plugin
    // to bump the version in their app.
    compileSdk 35

    // Guard ndkVersion access to avoid querying an unavailable provider in some
    // project evaluation contexts.
    if (project.hasProperty('flutter') && project.flutter?.ndkVersion != null) {
        ndkVersion project.flutter.ndkVersion
    }

    // Invoke the shared CMake build with the Android Gradle Plugin.
    externalNativeBuild {
        cmake {
            path "../src/CMakeLists.txt"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    defaultConfig {
        minSdk 21
    }
}
